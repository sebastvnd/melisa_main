# ============================================================================
# MNode Configuration File
# ============================================================================
# Konfigurasi untuk MNode Worker
# Format: TOML

# Server Configuration
host = "127.0.0.1"
port = 3000

# ============================================================================
# [registration] - Auto-registration ke Melisa Management API
# ============================================================================
[registration]
# Melisa Management API endpoint
melisa_host = "127.0.0.1"
melisa_port = 8888

# Node identity
node_name = "mnode-service"
node_domain = "localhost"
node_route_path = "/"

# ============================================================================
# [static_files] - Static file serving configuration
# ============================================================================
[static_files]
# Directory untuk HTML/CSS/JS/static files
# Path relatif dari mnode directory
directory = "./public/html"

# Enable static file serving
enabled = true

# ============================================================================
# [api] - Backend API Configuration
# ============================================================================
[api]
# Enable /api/info dan /api/health endpoints
enabled = true

# API base path
base_path = "/api"
